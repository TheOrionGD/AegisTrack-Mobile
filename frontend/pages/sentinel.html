<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // ZERO-TRUST SENTINEL</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> SENTINEL CORE</h1>
                <div class="status-pill"><span class="dot green pulse"></span> PERIMETER_ARMED</div>
            </header>
            <div class="dashboard-grid">
                <section class="panel">
                    <div class="panel-header"><i class="fa-solid fa-shield-halved"></i><h3>GEO-FENCE CONFIG</h3></div>
                    <div class="panel-body">
                        <div class="input-wrap"><label>ORIGIN LAT</label><input type="text" id="geoLat" class="btn-outline" style="width:100%" placeholder="0.000000"></div>
                        <div class="input-wrap"><label>ORIGIN LNG</label><input type="text" id="geoLng" class="btn-outline" style="width:100%" placeholder="0.000000"></div>
                        <div class="input-wrap"><label>RADIUS (METERS)</label><input type="number" id="geoRadius" class="btn-outline" style="width:100%" placeholder="100"></div>
                        <button id="armBtn" class="btn-primary" style="width:100%; margin-top:10px">ARM PERIMETER</button>
                    </div>
                </section>
                <section class="panel" style="grid-column: span 2;">
                    <div class="panel-header"><i class="fa-solid fa-satellite"></i><h3>SENTINEL STATUS</h3></div>
                    <div class="panel-body">
                        <div id="sentinelStatus" style="font-size: 2rem; text-align: center; color: var(--accent-green); margin: 30px 0;">SECURE</div>
                        <div class="log-preview">Sentinel engine is monitoring for breaches in Sector_07.</div>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>SENTINEL_ACTIVE_MODE</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/sentinel.js"></script>
</body>
</html>
