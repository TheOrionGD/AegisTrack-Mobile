<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // KERNEL CONFIGURATION</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> SYSTEM FORGE</h1>
                <div class="status-pill"><span class="dot green pulse"></span> KERNEL_UNLOCKED</div>
            </header>
            <div class="dashboard-grid">
                <section class="panel" style="grid-column: span 2;">
                    <div class="panel-header"><i class="fa-solid fa-gear"></i><h3>CORE CONFIGURATION</h3></div>
                    <div class="panel-body">
                        <div class="input-wrap"><label>BACKEND_UPLINK_URL</label><input type="text" id="backendUrl" class="btn-outline" style="width:100%" value="http://10.171.58.245:5000"></div>
                        <div class="input-wrap"><label>UI_REFRESH_RATE (MS)</label><input type="number" class="btn-outline" style="width:100%" value="1000"></div>
                        <button class="btn-primary" style="width:100%; margin-top:10px">SAVE_CORE_MODS</button>
                    </div>
                </section>
                <section class="panel">
                    <div class="panel-header"><i class="fa-solid fa-flask"></i><h3>EXPERIMENTAL</h3></div>
                    <div class="panel-body">
                        <div class="stat-label">HOLOGRAPHIC_OVERLAY</div>
                        <button class="btn-outline" style="width:100%">ENABLED</button>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>SYSTEM_FORGE_READY</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/systemforge.js"></script>
</body>
</html>
