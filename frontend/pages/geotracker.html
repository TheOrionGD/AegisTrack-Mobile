<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // TACTICAL SURVEILLANCE</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> GEO TRACKER</h1>
                <div class="status-pill"><span class="dot green pulse"></span> GPS_FIX_ACQUIRED</div>
            </header>
            <div class="dashboard-grid">
                <section class="panel" style="grid-column: span 2;">
                    <div class="panel-header"><i class="fa-solid fa-location-crosshairs"></i><h3>COORDINATE LOCK</h3></div>
                    <div class="panel-body">
                        <div class="input-wrap">
                            <label>TARGET HARDWARE NODE</label>
                            <div class="input-with-icon">
                                <i class="fa-solid fa-mobile-screen-button"></i>
                                <select id="deviceSelect" class="cyber-select">
                                    <option value="">-- SELECT NODE --</option>
                                </select>
                            </div>
                        </div>
                        <div class="telemetry-grid">
                            <div class="stat-box"><div class="stat-label">LATITUDE</div><div class="stat-val" id="lat">--</div></div>
                            <div class="stat-box"><div class="stat-label">LONGITUDE</div><div class="stat-val" id="lng">--</div></div>
                        </div>
                        <button id="syncBtn" class="btn-primary" style="width:100%; margin-top:15px">SYNC CURRENT LOCATION</button>
                    </div>
                </section>
                <section class="panel">
                    <div class="panel-header"><i class="fa-solid fa-bullseye"></i><h3>ACCURACY METRICS</h3></div>
                    <div class="panel-body">
                        <div class="stat-box"><div class="stat-label">PRECISION</div><div class="stat-val" id="acc">-- M</div></div>
                        <div class="log-preview" style="margin-top:10px">Signal quality: Optimal</div>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>LOCATION_DATA_ENCRYPTED</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/geotracker.js"></script>
</body>
</html>
