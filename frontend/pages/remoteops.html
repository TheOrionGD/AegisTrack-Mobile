<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // CYBER OPERATIONS</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> REMOTE OPS</h1>
                <div class="status-pill"><span class="dot green pulse"></span> OPS_CENTER_READY</div>
            </header>
            <div class="dashboard-grid">
                <section class="panel" style="grid-column: span 3;">
                    <div class="panel-header"><i class="fa-solid fa-terminal"></i><h3>OPERATIONAL COMMAND CENTER</h3></div>
                    <div class="panel-body centered">
                        <div class="telemetry-grid">
                            <div class="panel" style="border-color: var(--accent-orange)">
                                <i class="fa-solid fa-power-off" style="font-size: 2rem; color: var(--accent-orange)"></i>
                                <div class="stat-label" style="margin-top:10px">SYSTEM_KILL_SWITCH</div>
                                <button class="btn-danger" style="margin-top:10px; width:100%">EXECUTE_PURGE</button>
                            </div>
                            <div class="panel" style="border-color: var(--accent-green)">
                                <i class="fa-solid fa-rotate" style="font-size: 2rem; color: var(--accent-green)"></i>
                                <div class="stat-label" style="margin-top:10px">KERNEL_HOT_RELOAD</div>
                                <button class="btn-primary" style="margin-top:10px; width:100%">RELOAD_CORE</button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>REMOTE_OPS_ENCRYPTED</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/remoteops.js"></script>
</body>
</html>
