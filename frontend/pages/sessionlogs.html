<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // FORENSIC AUDIT LOGS</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> SESSION LOGS</h1>
                <div class="status-pill"><span class="dot green pulse"></span> AUDIT_TRAIL_ACTIVE</div>
            </header>
            <div class="dashboard-grid">
                <section class="panel" style="grid-column: span 3;">
                    <div class="panel-header"><i class="fa-solid fa-terminal"></i><h3>OPERATOR SESSION ARCHIVE</h3></div>
                    <div class="panel-body">
                        <table style="width:100%; font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-secondary); text-align: left;">
                            <thead style="color: var(--accent-cyan); border-bottom: 1px solid var(--border-color);">
                                <tr>
                                    <th style="padding:10px">TIMESTAMP</th>
                                    <th>OPERATOR</th>
                                    <th>EVENT</th>
                                    <th>IP_ADDRESS</th>
                                </tr>
                            </thead>
                            <tbody id="logBody">
                                <!-- Generated by JS -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>AUDIT_LOG_SECURE</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/sessionlogs.js"></script>
</body>
</html>
