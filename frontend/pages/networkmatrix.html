<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // NETWORK MATRIX</title>`n    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .topology-view {
            height: 350px;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(0,0,0,0.3);
        }
        .node-circle {
            width: 40px; height: 40px;
            border: 1px solid var(--accent-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-cyan);
            font-size: 0.8rem;
            box-shadow: 0 0 10px var(--accent-cyan-glow);
            position: absolute;
        }
        .line {
            position: absolute;
            background: linear-gradient(90deg, var(--accent-cyan), transparent);
            height: 1px;
            transform-origin: left center;
        }
    </style>
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> NETWORK MATRIX</h1>
                <div class="status-pill"><span class="dot green pulse"></span> MESH_TOPOLOGY_OPTIMAL</div>
            </header>
            <div class="dashboard-grid">
                <section class="panel" style="grid-column: span 3;">
                    <div class="panel-header"><i class="fa-solid fa-network-wired"></i><h3>NODE TOPOLOGY</h3></div>
                    <div class="panel-body">
                        <div class="topology-view">
                            <div class="node-circle" style="top:50%; left:50%">HUB</div>
                            <div class="node-circle" style="top:20%; left:30%">N1</div>
                            <div class="node-circle" style="top:20%; left:70%">N2</div>
                            <div class="node-circle" style="top:80%; left:30%">N3</div>
                            <div class="node-circle" style="top:80%; left:70%">N4</div>
                        </div>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>MESH_NETWORK_ACTIVE</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/networkmatrix.js"></script>
</body>
</html>
