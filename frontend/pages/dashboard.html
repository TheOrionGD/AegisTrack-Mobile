<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // SOC C2 KERNEL</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> C2 CONTROL NEXUS</h1>
                <div class="status-pill"><span class="dot green pulse"></span> SOC SECURE</div>
            </header>
            <div class="dashboard-grid">
                <!-- AUTH PANEL -->
                <section class="panel">
                    <div class="panel-header"><i class="fa-solid fa-lock"></i><h3>SECURE ACCESS</h3></div>
                    <div class="panel-body">
                        <div class="input-wrap"><label>OPERATOR ID</label><div class="input-with-icon"><i class="fa-solid fa-user"></i><input type="text" id="username" placeholder="IDENTIFIER"></div></div>
                        <div class="input-wrap"><label>ACCESS CODE</label><div class="input-with-icon"><i class="fa-solid fa-key"></i><input type="password" id="password" placeholder="••••"></div></div>
                        <div class="btn-group"><button id="loginBtn" class="btn-primary">LOGIN</button><button id="registerBtn" class="btn-outline">REGISTER</button></div>
                        <p id="authStatus" class="stat-label" style="margin-top:10px">Awaiting credentials...</p>
                        <button id="copyTokenBtn" class="btn-subtle" style="width:100%; margin-top:10px; display:none;">
                            <i class="fa-solid fa-copy"></i> COPY SESSION TOKEN
                        </button>
                    </div>
                </section>
                <!-- STATUS PANEL -->
                <section class="panel">
                    <div class="panel-header"><i class="fa-solid fa-chart-line"></i><h3>SYSTEM HEALTH</h3></div>
                    <div class="panel-body">
                        <div class="telemetry-grid">
                            <div class="stat-box"><div class="stat-label">CPU LOAD</div><div class="stat-val">12%</div></div>
                            <div class="stat-box"><div class="stat-label">MEMORY</div><div class="stat-val">640MB</div></div>
                        </div>
                        <div class="log-preview" style="margin-top:15px">All primary kernels operating within normal parameters.</div>
                    </div>
                </section>
                <!-- QUICK ACTIONS -->
                <section class="panel">
                    <div class="panel-header"><i class="fa-solid fa-bolt"></i><h3>QUICK OPS</h3></div>
                    <div class="panel-body">
                        <button class="btn-outline" style="width:100%; margin-bottom:10px">FLUSH CACHE</button>
                        <button class="btn-outline" style="width:100%">REBOOT NODES</button>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>ENCRYPTED_LINK_ACTIVE | v2.5.0-ELITE</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
