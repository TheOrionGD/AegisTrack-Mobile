<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // OPERATOR CONSOLE</title>`n    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> OPERATOR CONSOLE</h1>
                <div class="status-pill"><span class="dot green pulse"></span> ADMIN_ACCESS_LEVEL_5</div>
            </header>
            <div class="dashboard-grid">
                <section class="panel" style="grid-column: span 3;">
                    <div class="panel-header"><i class="fa-solid fa-users-gear"></i><h3>ACTIVE OPERATORS</h3></div>
                    <div class="panel-body">
                        <div id="operatorList" style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
                            <!-- Operators generated by JS -->
                        </div>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>COMMAND_AUTHORITY_VERIFIED</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/operatorconsole.js"></script>
</body>
</html>
