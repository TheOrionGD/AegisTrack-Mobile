<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // INTEL ANALYTICS</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> AI ANALYTICS</h1>
                <div class="status-pill" style="border-color:var(--accent-cyan); color:var(--accent-cyan); background:rgba(0,242,255,0.1)">
                    <span class="dot pulse" style="background:var(--accent-cyan); box-shadow: 0 0 8px var(--accent-cyan)"></span> NEURAL_CORE_ONLINE
                </div>
            </header>
            <div class="dashboard-grid">
                <section class="panel" style="grid-column: span 3;">
                    <div class="panel-header"><i class="fa-solid fa-brain"></i><h3>GROQ NEURAL PROCESSING</h3></div>
                    <div class="panel-body centered">
                        <div id="aiResponse" style="min-height: 100px; background: rgba(0,0,0,0.4); border: 1px dashed var(--border-color); padding: 20px; border-radius: 8px; font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent-cyan); text-align: left; line-height: 1.6;">
                            [SYSTEM] Awaiting neural trigger. Predictive analysis ready.
                        </div>
                        <button id="analyzeBtn" class="btn-primary" style="margin-top:20px; width:100%">
                            <i class="fa-solid fa-microchip"></i> EXECUTE NEURAL SCAN
                        </button>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>AI_PREDICTIVE_ENGINE_STABLE</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/aianalytics.js"></script>
</body>
</html>
