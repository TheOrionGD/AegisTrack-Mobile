<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // REMOTE COMMANDS</title>`n    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> REMOTE COMMANDS</h1>
                <div class="status-pill"><span class="dot green pulse"></span> UPLINK_STANDBY</div>
            </header>
            <div class="dashboard-grid">
                <section class="panel" style="grid-column: span 3;">
                    <div class="panel-header"><i class="fa-solid fa-code"></i><h3>COMMAND TERMINAL</h3></div>
                    <div class="panel-body">
                        <div id="terminal" style="height: 350px; background: #000; padding: 20px; font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent-green); overflow-y: auto;">
                            <div class="line">MTS OS v2.5.0 // REMOTE_ACCESS_INITIALIZED</div>
                            <div class="line">--------------------------------------------</div>
                            <div class="line">READY FOR INPUT...</div>
                        </div>
                        <div class="input-wrap" style="margin-top:10px; display:flex; gap:10px">
                            <input type="text" id="cmdInput" class="btn-outline" style="flex:1; text-align:left; padding-left:15px" placeholder="ENTER COMMAND: shutdown -n 01">
                            <button id="sendBtn" class="btn-primary" style="width:100px">SEND</button>
                        </div>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>ENCRYPTED_COMMAND_CHANNEL_ACTIVE</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/remotecommands.js"></script>
</body>
</html>
