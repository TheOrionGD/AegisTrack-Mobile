<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // TELEMETRY STREAM</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> TELEMETRY STREAM</h1>
                <div class="status-pill"><span class="dot green pulse"></span> SIGNAL ACTIVE</div>
            </header>
            <div class="dashboard-grid">
                <section class="panel" style="grid-column: span 2;">
                    <div class="panel-header"><i class="fa-solid fa-wave-square"></i><h3>LIVE DATA FEED</h3></div>
                    <div class="panel-body">
                        <div id="liveFeed" style="height: 300px; overflow-y: auto; font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent-cyan);">
                            <div class="log-entry">[00:00:01] INITIALIZING_UPLINK...</div>
                        </div>
                    </div>
                </section>
                <section class="panel">
                    <div class="panel-header"><i class="fa-solid fa-satellite"></i><h3>SIGNAL LOCK</h3></div>
                    <div class="panel-body">
                        <div class="stat-box"><div class="stat-label">STRENGTH</div><div class="stat-val">98%</div></div>
                        <div class="stat-box" style="margin-top:10px"><div class="stat-label">LATENCY</div><div class="stat-val">24ms</div></div>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>TELEMETRY_UPLINK_STABLE</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/telemetry.js"></script>
</body>
</html>
