<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // GLOBAL THREAT MAP</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        .map-canvas {
            width: 100%;
            height: calc(100vh - 150px);
            background: radial-gradient(circle, #0d121c 0%, #05070a 100%);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        /* Standby splash shown before a device is selected */
        .map-standby {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 2px;
            z-index: 2;
            pointer-events: none;
        }
        .map-standby i {
            font-size: 2.5rem;
            color: rgba(0, 242, 255, 0.2);
        }
        #googleMap { display: none; }
    </style>
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> MAP VIEW</h1>
                <div class="status-pill"><span class="dot green pulse"></span> SATELLITE_UPLINK_LIVE</div>
            </header>
            <section class="panel" style="margin-bottom:15px; padding:10px;">
                <div class="input-wrap" style="margin-bottom:0; display:flex; align-items:center; gap:15px;">
                    <label style="margin-bottom:0; white-space:nowrap;">TARGET NODE:</label>
                    <select id="deviceSelect" class="cyber-select" style="max-width:300px;">
                        <option value="">-- SELECT ACTIVE NODE --</option>
                    </select>
                </div>
            </section>
            <div class="map-canvas">
                <div class="grid-overlay"></div>
                <!-- Standby splash — hidden once a device is selected -->
                <div class="map-standby" id="mapStandby">
                    <i class="fa-solid fa-satellite-dish"></i>
                    <span>AWAITING_NODE_SELECTION</span>
                    <span style="font-size:0.55rem; opacity:0.5;">Select a registered device from the dropdown above</span>
                </div>
                <iframe
                    id="googleMap"
                    width="100%"
                    height="100%"
                    frameborder="0"
                    scrolling="no"
                    marginheight="0"
                    marginwidth="0"
                    src="about:blank"
                    style="filter: grayscale(0.4) contrast(1.1) brightness(0.85);">
                </iframe>
                <div style="position:absolute; bottom:20px; left:20px; background:rgba(0,0,0,0.75); padding:10px; border:1px solid var(--accent-cyan); font-family:var(--font-mono); font-size:0.7rem; color:var(--accent-cyan); border-radius:4px; pointer-events:none;">
                    COORD_REF: <span id="hudCoords">-- / --</span><br>
                    ZOOM_LEVEL: 15x<br>
                    TRACKING_MODE: <span id="hudMode">IDLE</span><br>
                    LAST_SYNC: <span id="hudLastSync">--:--:--</span>
                </div>
            </div>
            <footer class="main-footer">
                <div>CARTOGRAPHY_ENGINE_STABLE</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/mapview.js"></script>
</body>
</html>
