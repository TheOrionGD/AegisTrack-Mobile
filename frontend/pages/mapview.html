<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // GLOBAL THREAT MAP</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        .map-canvas {
            width: 100%;
            height: calc(100vh - 150px);
            background: radial-gradient(circle, #0d121c 0%, #05070a 100%);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .map-marker {
            width: 12px; height: 12px;
            background: var(--accent-cyan);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 15px var(--accent-cyan);
            animation: pulse-marker 2s infinite;
        }
        @keyframes pulse-marker {
            0% { transform: scale(1); box-shadow: 0 0 5px var(--accent-cyan); }
            50% { transform: scale(1.5); box-shadow: 0 0 20px var(--accent-cyan); }
            100% { transform: scale(1); box-shadow: 0 0 5px var(--accent-cyan); }
        }
    </style>
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> MAP VIEW</h1>
                <div class="status-pill"><span class="dot green pulse"></span> SATELLITE_UPLINK_LIVE</div>
            </header>
            <div class="map-canvas">
                <div class="grid-overlay"></div>
                <div id="marker" class="map-marker" style="top: 50%; left: 50%;"></div>
                <div style="position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid var(--accent-cyan); font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent-cyan);">
                    COORD_REF: 10.8738 / 78.7262<br>
                    ZOOM_LEVEL: 14.5x<br>
                    TRACKING_MODE: ACTIVE
                </div>
            </div>
            <footer class="main-footer">
                <div>CARTOGRAPHY_ENGINE_STABLE</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/mapview.js"></script>
</body>
</html>
