<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // TRAFFIC INTEGRITY</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> NETWORK MONITOR</h1>
                <div class="status-pill"><span class="dot green pulse"></span> SIGNAL_STABLE</div>
            </header>
            <div class="dashboard-grid">
                <section class="panel" style="grid-column: span 2;">
                    <div class="panel-header"><i class="fa-solid fa-chart-area"></i><h3>LATENCY DIAGNOSTICS</h3></div>
                    <div class="panel-body">
                        <div id="latencyGraph" style="height: 200px; border-bottom: 2px solid var(--accent-cyan); position: relative; display: flex; align-items: flex-end; gap: 5px; padding: 10px;">
                            <!-- Bars will be generated by JS -->
                        </div>
                    </div>
                </section>
                <section class="panel">
                    <div class="panel-header"><i class="fa-solid fa-gauge-high"></i><h3>BANDWIDTH OPS</h3></div>
                    <div class="panel-body">
                        <div class="stat-box"><div class="stat-label">UPLINK</div><div class="stat-val" id="uplink">14.2 MB/s</div></div>
                        <div class="stat-box" style="margin-top:10px"><div class="stat-label">DOWNLINK</div><div class="stat-val" id="downlink">8.5 MB/s</div></div>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>NETWORK_LINK_SECURE</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/networkmonitor.js"></script>
</body>
</html>
