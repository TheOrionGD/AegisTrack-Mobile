<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // ARCHIVE NODE</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> ARCHIVE NODE</h1>
                <div class="status-pill"><span class="dot green pulse"></span> ARCHIVE_SYNCED</div>
            </header>
            <div class="dashboard-grid">
                <section class="panel" style="grid-column: span 1;">
                    <div class="panel-header"><i class="fa-solid fa-layer-group"></i><h3>DATABASE_MODULES</h3></div>
                    <div class="panel-body">
                        <div id="moduleList" class="side-links" style="display: flex; flex-direction: column; gap: 10px;">
                            <button class="btn-subtle active" data-module="analytics">ANALYTICS</button>
                            <button class="btn-subtle" data-module="threats">THREATS</button>
                            <button class="btn-subtle" data-module="logs">LOGS</button>
                            <button class="btn-subtle" data-module="files">FILES</button>
                            <button class="btn-subtle" data-module="operators">OPERATORS</button>
                            <button class="btn-subtle" data-module="config">CONFIG</button>
                        </div>
                    </div>
                </section>

                <section class="panel" style="grid-column: span 3;">
                    <div class="panel-header"><i class="fa-solid fa-box-archive"></i><h3 id="currentModuleName">ANALYTICS_RECORDS</h3></div>
                    <div class="panel-body">
                        <div id="vaultContent" style="max-height: 500px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;">
                            <div class="stat-label">INITIALIZING_QUERY...</div>
                        </div>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>COLD_STORAGE_ENCRYPTED</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/archivenode.js"></script>
</body>
</html>
