<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTS // RELAY SYNCHRONIZATION</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cloud-hologram {
            width: 150px; height: 150px;
            margin: 30px auto;
            position: relative;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 5rem;
            color: var(--accent-cyan);
            filter: drop-shadow(0 0 20px var(--accent-cyan));
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="cyber-theme">
    <div class="app-container">
        <nav class="sidebar"></nav>
        <main class="content-area">
            <header class="main-header">
                <h1>MTS <span class="sep">//</span> CLOUD SYNC</h1>
                <div class="status-pill"><span class="dot green pulse"></span> CLOUD_CONNECTED</div>
            </header>
            <div class="dashboard-grid">
                <section class="panel centered" style="grid-column: span 3;">
                    <div class="panel-header"><i class="fa-solid fa-cloud-arrow-up"></i><h3>NEURAL CLOUD LINK</h3></div>
                    <div class="panel-body">
                        <div class="cloud-hologram"><i class="fa-solid fa-cloud"></i></div>
                        <div class="stat-box" style="width: 300px; margin: 0 auto;">
                            <div class="stat-label">STORAGE_UTILIZATION</div>
                            <div class="stat-val" id="storageVal">42.8 GB / 1 TB</div>
                        </div>
                        <button id="syncBtn" class="btn-primary" style="margin-top:20px; width: 300px;">
                            <i class="fa-solid fa-rotate"></i> FORCE_CLOUD_SYNC
                        </button>
                    </div>
                </section>
            </div>
            <footer class="main-footer">
                <div>CLOUD_ENCRYPTION_AES_256</div>
                <div id="utcTime">UTC --:--:--</div>
            </footer>
        </main>
    </div>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/cloudsync.js"></script>
</body>
</html>
